<div class="container">
  <div class="box"></div>
</div>

<style>
.container{
  width: 300px;
  height: 300px;
  border: 2px solid black;
  position: relative;
}

.box{
  width: 50px;
  height: 50px;
  background: red;
  position: absolute;
  animation: moveBox 1s forwards;
}

@keyframes moveBox {
  from {
    transform: translate(0,0);
  }
  to {
    transform: translate(250px,250px);
  }
}
</style>
